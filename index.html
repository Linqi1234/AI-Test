<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <script>
    let isHuman;
    let person = prompt("Please enter your score", "true or false");
    if (person == "true") {
      isHuman = true;
    } else {
      isHuman = false;
    }

    async function connectToArduino() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        return port;
      } catch (error) {
        console.error('Error connecting to Arduino:', error);
      }
    }

    async function sendResultToArduino(isHuman) {
      const port = await connectToArduino();
      const writer = port.writable.getWriter();

      // 发送字符串数据给Arduino
      const result = isHuman ? "true" : "false";
      const data = new TextEncoder().encode(result);

      // 将数据写入串行端口
      await writer.write(data);

      // 释放写入器
      writer.releaseLock();
    }
  </script>
</head>

</html>
